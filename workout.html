<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Workout Tracker</title>
    
    <!-- 1. FIXED FULL SDK LINKS -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { --accent: #00e676; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .user-bar { width: 100%; max-width: 900px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card); padding: 15px; border-radius: 12px; box-sizing: border-box; }
        input, textarea, select { background: #2c2c2c; color: white; border: 1px solid #444; border-radius: 6px; padding: 8px; }
        .container { display: flex; gap: 20px; max-width: 1000px; width: 100%; flex-wrap: wrap; justify-content: center; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 350px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .day { padding: 12px 5px; border-radius: 8px; cursor: pointer; background: #2c2c2c; font-size: 14px; }
        .day.has-workout { border-bottom: 3px solid var(--accent); }
        .day.today { border: 2px solid var(--accent); color: var(--accent); }
        .entry-item { background: #2c2c2c; padding: 10px; margin-top: 10px; border-radius: 8px; position: relative; border-left: 3px solid var(--accent); text-align: left; }
        .btn-del { color: #ff5252; cursor: pointer; position: absolute; right: 10px; top: 10px; font-weight: bold; }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .stat-value { font-size: 32px; font-weight: bold; color: var(--accent); }
        #log-panel { display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="user-bar">
        <div id="auth-section">
            <button onclick="login()" class="btn-main" style="width: auto; margin-top:0">Login with Google</button>
        </div>
        <div id="user-display" class="hidden" style="display:flex; align-items:center; gap:15px;">
            <span id="welcome-text"></span>
            <button onclick="logout()" style="background:none; border:1px solid #444; color:#888; cursor:pointer; padding:5px 10px; border-radius:6px">Sign Out</button>
        </div>
        <select id="userFilter" onchange="renderAll()"><option value="all">Everyone</option></select>
    </div>

    <div class="container">
        <div style="display:flex; flex-direction:column; gap:20px;">
            <div class="card">
                <header>
                    <button onclick="changeMonth(-1)" style="background:none; border:none; color:white; cursor:pointer;">❮</button>
                    <h3 id="monthDisplay" style="margin:0"></h3>
                    <button onclick="changeMonth(1)" style="background:none; border:none; color:white; cursor:pointer;">❯</button>
                </header>
                <div class="days-grid" id="calendarGrid"></div>
            </div>

            <div class="card" id="log-panel">
                <h4 id="selectedDateText" style="margin:0; color:var(--accent);"></h4>
                <div id="existingEntries"></div>
                <div style="margin-top:15px; border-top:1px solid #333; padding-top:15px;">
                    <div style="display:flex; gap:10px; margin-bottom:10px;">
                        <input type="number" id="durationInput" placeholder="Mins" style="width:80px;">
                        <input type="text" id="workoutInput" placeholder="Workout details..." style="flex:1">
                    </div>
                    <button class="btn-main" onclick="saveWorkout()">ADD ENTRY</button>
                </div>
            </div>
        </div>

        <div class="card" style="width: 300px;">
            <select id="timeframe" onchange="renderStats()" style="background:transparent; border:none; color:#888; font-size:11px; font-weight:bold; margin-bottom:5px; width: 100%;">
                <option value="day">TODAY</option>
                <option value="week" selected>WEEK (SUN-SAT)</option>
                <option value="month">MONTH</option>
                <option value="year">YEAR</option>
            </select>
            <div class="stat-value" id="statDisplay">0.0h</div>
            <h4 style="border-bottom:1px solid #333; padding-bottom:10px;">History</h4>
            <div id="recentList"></div>
        </div>
    </div>

    <script>
        // 2. CONFIG FROM YOUR PROJECT
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyBMWtr0_uUodMhyZl5iFDtt1PTbJdBdCkA",
            authDomain: "gizmos-workout-tracker.firebaseapp.com",
            databaseURL: "https://gizmos-workout-tracker-default-rtdb.firebaseio.com",
            projectId: "gizmos-workout-tracker",
            storageBucket: "gizmos-workout-tracker.firebasestorage.app",
            messagingSenderId: "596976593675",
            appId: "1:596976593675:web:42ad30be5205ce1c05500e",
            measurementId: "G-8K6PT8G7LM"
        };

        let auth, db;
        let currentDate = new Date();
        let selectedDateKey = "";
        let workoutData = {};
        let currentUser = null;

        // 3. WAIT FOR SCRIPTS TO LOAD
        window.onload = function() {
            if (typeof firebase === 'undefined') {
                alert("Firebase failed to load. Check your internet or script URLs.");
                return;
            }

            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.database();

            // Listen for Login State
            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('user-display').classList.remove('hidden');
                    document.getElementById('welcome-text').innerText = `Hi, ${user.displayName}`;
                    syncData();
                } else {
                    currentUser = null;
                    document.getElementById('auth-section').classList.remove('hidden');
                    document.getElementById('user-display').classList.add('hidden');
                    workoutData = {};
                    renderAll();
                }
            });
        };

        function login() { 
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert(err.message));
        }
        
        function logout() { auth.signOut(); }

        function syncData() {
            db.ref('workouts').on('value', snapshot => {
                workoutData = snapshot.val() || {};
                renderAll();
            });
        }

        function renderAll() {
            const filter = document.getElementById('userFilter');
            const currentF = filter.value;
            const users = new Set();
            Object.values(workoutData).forEach(day => Object.values(day).forEach(w => users.add(w.user)));
            filter.innerHTML = '<option value="all">Everyone</option>';
            users.forEach(u => filter.innerHTML += `<option value="${u}">${u}</option>`);
            filter.value = currentF;

            renderCalendar();
            renderStats();
            if (selectedDateKey) openLog(selectedDateKey);
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const filter = document.getElementById('userFilter').value;
            grid.innerHTML = "";
            const y = currentDate.getFullYear(), m = currentDate.getMonth();
            document.getElementById('monthDisplay').innerText = currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            
            const firstDay = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${y}-${m + 1}-${d}`;
                const hasData = workoutData[dateKey] && Object.values(workoutData[dateKey]).some(w => filter === 'all' || w.user === filter);
                grid.innerHTML += `<div class="day ${new Date().toDateString() === new Date(y, m, d).toDateString() ? 'today' : ''} ${hasData ? 'has-workout' : ''}" onclick="openLog('${dateKey}')">${d}</div>`;
            }
        }

        function openLog(dateKey) {
            selectedDateKey = dateKey;
            document.getElementById('log-panel').style.display = 'block';
            document.getElementById('selectedDateText').innerText = dateKey;
            const entries = workoutData[dateKey] ? Object.entries(workoutData[dateKey]) : [];
            document.getElementById('existingEntries').innerHTML = entries.map(([id, item]) => `
                <div class="entry-item">
                    <small style="color:var(--accent)">${item.user}</small>
                    <div>${item.note} (${item.mins}m)</div>
                    <span class="btn-del" onclick="deleteEntry('${dateKey}', '${id}')">&times;</span>
                </div>`).join('');
        }

        function saveWorkout() {
            if (!currentUser) return alert("Log in to save data!");
            const note = document.getElementById('workoutInput').value.trim();
            const mins = document.getElementById('durationInput').value;
            if (note && mins) {
                db.ref(`workouts/${selectedDateKey}`).push({
                    user: currentUser.displayName,
                    uid: currentUser.uid,
                    note: note,
                    mins: parseInt(mins),
                    timestamp: Date.now()
                });
                document.getElementById('workoutInput').value = "";
                document.getElementById('durationInput').value = "";
            }
        }

        function deleteEntry(dateKey, entryId) {
            if(confirm("Delete this entry?")) {
                db.ref(`workouts/${dateKey}/${entryId}`).remove();
            }
        }

        function renderStats() {
            const filter = document.getElementById('userFilter').value;
            const timeframe = document.getElementById('timeframe').value;
            let all = [];
            Object.keys(workoutData).forEach(d => {
                Object.values(workoutData[d]).forEach(w => { if(filter === 'all' || w.user === filter) all.push({...w, date: d}); });
            });
            
            const now = new Date();
            let start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            if(timeframe === 'week') start.setDate(now.getDate() - now.getDay());
            else if(timeframe === 'month') start.setDate(1);
            else if(timeframe === 'year') { start.setMonth(0); start.setDate(1); }

            const totalMins = all.filter(w => new Date(w.date) >= start).reduce((s, w) => s + w.mins, 0);
            document.getElementById('statDisplay').innerText = (totalMins / 60).toFixed(1) + "h";
            
            all.sort((a,b) => b.timestamp - a.timestamp);
            document.getElementById('recentList').innerHTML = all.slice(0, 5).map(w => `<div style="font-size:12px; padding:5px 0; border-bottom:1px solid #333"><b>${w.user}</b>: ${w.note} (${w.mins}m)</div>`).join('');
        }

        function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }
    </script>
</body>
</html>
