<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Cloud Workout Tracker</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --accent: #00e676;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --muted: #999;
            --border: #444;
            --danger: #ff5252;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .user-bar {
            width: 100%;
            max-width: 980px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            background: var(--card);
            padding: 14px;
            border-radius: 14px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .left-group,
        .right-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        input,
        textarea,
        select,
        button {
            font: inherit;
        }

        input,
        textarea,
        select {
            background: #2c2c2c;
            color: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            min-height: 42px;
        }

        select {
            max-width: 100%;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 980px;
            width: 100%;
            align-items: flex-start;
            justify-content: center;
        }

        .main-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1 1 620px;
            min-width: 0;
        }

        .side-column {
            flex: 0 0 300px;
            min-width: 280px;
        }

        .card {
            background: var(--card);
            padding: 18px;
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.35);
            width: 100%;
        }

        header.calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            gap: 10px;
        }

        .month-nav-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 24px;
            line-height: 1;
            padding: 8px 10px;
            border-radius: 8px;
            min-width: 44px;
            min-height: 44px;
        }

        .month-nav-btn:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        #monthDisplay {
            margin: 0;
            text-align: center;
            font-size: 1.15rem;
            flex: 1;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 8px;
            text-align: center;
        }

        .day {
            min-height: 46px;
            padding: 12px 4px;
            border-radius: 10px;
            cursor: pointer;
            background: #2c2c2c;
            font-size: 14px;
            border: 2px solid transparent;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, border 0.12s ease;
        }

        .day:hover {
            transform: translateY(-1px);
        }

        .day.has-workout {
            border-bottom: 3px solid var(--accent);
        }

        .day.today {
            border: 2px solid var(--accent);
            color: var(--accent);
        }

        .day.selected {
            background: var(--accent);
            color: #000;
            font-weight: bold;
            border: 2px solid #ffffff;
            box-shadow: 0 0 12px rgba(0, 230, 118, 0.55);
            transform: scale(1.03);
        }

        .day.today.selected {
            color: #000;
        }

        .entry-item {
            background: #2c2c2c;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            position: relative;
            border-left: 3px solid var(--accent);
            text-align: left;
        }

        .entry-note {
            margin-top: 4px;
            padding-right: 24px;
            word-break: break-word;
        }

        .entry-meta {
            margin-top: 6px;
            color: var(--muted);
            font-size: 11px;
        }

        .btn-del {
            color: var(--danger);
            cursor: pointer;
            position: absolute;
            right: 10px;
            top: 8px;
            font-weight: bold;
            font-size: 20px;
            line-height: 1;
        }

        .btn-main {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            min-height: 46px;
        }

        .btn-main:hover {
            filter: brightness(0.98);
        }

        .logout-btn {
            background: none;
            border: 1px solid var(--border);
            color: #aaa;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            min-height: 42px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .history-item {
            font-size: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #333;
            word-break: break-word;
        }

        #log-panel {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        .muted {
            color: var(--muted);
            font-size: 12px;
        }

        .entry-form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .mins-input {
            width: 90px;
            flex: 0 0 90px;
        }

        .details-input {
            flex: 1;
            min-width: 0;
        }

        .entry-user-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .entry-user-select,
        .entry-user-custom {
            flex: 1;
            min-width: 0;
        }

        .timeframe-select {
            background: transparent;
            border: none;
            color: #888;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 5px;
            width: 100%;
            min-height: 32px;
            padding-left: 0;
        }

        @media (max-width: 860px) {
            .container {
                flex-direction: column;
                align-items: stretch;
            }

            .main-column,
            .side-column {
                flex: 1 1 auto;
                min-width: 0;
                width: 100%;
            }

            .side-column {
                order: 3;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 10px;
            }

            .user-bar {
                padding: 12px;
                border-radius: 12px;
                align-items: stretch;
            }

            .left-group,
            .right-group {
                width: 100%;
            }

            .right-group {
                justify-content: space-between;
            }

            #userFilter {
                width: 100%;
            }

            .card {
                padding: 14px;
                border-radius: 12px;
            }

            #monthDisplay {
                font-size: 1rem;
            }

            .days-grid {
                gap: 6px;
            }

            .day {
                min-height: 42px;
                padding: 10px 2px;
                font-size: 13px;
                border-radius: 8px;
            }

            .entry-form-row,
            .entry-user-row {
                flex-direction: column;
            }

            .mins-input,
            .details-input,
            .entry-user-select,
            .entry-user-custom {
                width: 100%;
                flex: 1 1 auto;
            }

            .stat-value {
                font-size: 28px;
            }
        }

        @media (max-width: 420px) {
            .day {
                min-height: 38px;
                font-size: 12px;
            }

            .month-nav-btn {
                font-size: 22px;
                min-width: 40px;
                min-height: 40px;
            }

            .btn-main,
            .logout-btn,
            input,
            select {
                min-height: 44px;
            }
        }
    </style>
</head>
<body>
    <div class="user-bar">
        <div class="left-group">
            <div id="auth-section">
                <button onclick="login()" class="btn-main" style="width:auto; margin-top:0;">
                    Login with Google
                </button>
            </div>

            <div id="user-display" class="hidden" style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                <span id="welcome-text"></span>
                <button onclick="logout()" class="logout-btn">Sign Out</button>
            </div>
        </div>

        <div class="right-group">
            <select id="userFilter" onchange="renderAll()">
                <option value="all">Everyone</option>
            </select>
        </div>
    </div>

    <div class="container">
        <div class="main-column">
            <div class="card">
                <header class="calendar-header">
                    <button class="month-nav-btn" onclick="changeMonth(-1)" aria-label="Previous month">❮</button>
                    <h3 id="monthDisplay"></h3>
                    <button class="month-nav-btn" onclick="changeMonth(1)" aria-label="Next month">❯</button>
                </header>
                <div class="days-grid" id="calendarGrid"></div>
            </div>

            <div class="card" id="log-panel">
                <h4 id="selectedDateText" style="margin:0; color:var(--accent);"></h4>
                <div id="existingEntries"></div>

                <div style="margin-top:15px; border-top:1px solid #333; padding-top:15px;">
                    <div class="entry-user-row">
                        <select id="entryUserSelect" class="entry-user-select" onchange="handleEntryUserChange()">
                            <option value="me">Me</option>
                            <option value="custom">Custom name...</option>
                        </select>
                        <input
                            type="text"
                            id="entryUserCustom"
                            class="entry-user-custom hidden"
                            placeholder="Enter name"
                        />
                    </div>

                    <div class="entry-form-row">
                        <input type="number" id="durationInput" class="mins-input" placeholder="Mins" min="1" inputmode="numeric" />
                        <input type="text" id="workoutInput" class="details-input" placeholder="Workout details..." />
                    </div>

                    <button class="btn-main" onclick="saveWorkout()">ADD ENTRY</button>
                </div>
            </div>
        </div>

        <div class="side-column">
            <div class="card">
                <select id="timeframe" class="timeframe-select" onchange="renderStats()">
                    <option value="day">TODAY</option>
                    <option value="week" selected>WEEK (SUN-SAT)</option>
                    <option value="month">MONTH</option>
                    <option value="year">YEAR</option>
                </select>

                <div class="stat-value" id="statDisplay">0.0h</div>
                <h4 style="border-bottom:1px solid #333; padding-bottom:10px;">History</h4>
                <div id="recentList"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBMWtr0_uUodMhyZl5iFDtt1PTbJdBdCkA",
            authDomain: "gizmos-workout-tracker.firebaseapp.com",
            databaseURL: "https://gizmos-workout-tracker-default-rtdb.firebaseio.com",
            projectId: "gizmos-workout-tracker",
            storageBucket: "gizmos-workout-tracker.firebasestorage.app",
            messagingSenderId: "596976593675",
            appId: "1:596976593675:web:42ad30be5205ce1c05500e",
            measurementId: "G-8K6PT8G7LM"
        };

        let auth = null;
        let db = null;
        let workoutsRef = null;
        let currentDate = new Date();
        let selectedDateKey = "";
        let workoutData = {};
        let currentUser = null;

        function el(id) {
            return document.getElementById(id);
        }

        function parseDateKey(dateKey) {
            const parts = String(dateKey).split("-").map(Number);
            return new Date(parts[0], parts[1] - 1, parts[2]);
        }

        function formatDateKey(year, monthIndex, day) {
            return `${year}-${monthIndex + 1}-${day}`;
        }

        function escapeCss(value) {
            if (window.CSS && typeof window.CSS.escape === "function") {
                return window.CSS.escape(value);
            }
            return String(value).replace(/"/g, '\\"');
        }

        function initializeApp() {
            if (typeof firebase === "undefined") {
                alert("Firebase failed to load. Check your internet or script URLs.");
                return;
            }

            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }

                auth = firebase.auth();
                db = firebase.database();

                auth.onAuthStateChanged(user => {
                    const authSection = el("auth-section");
                    const userDisplay = el("user-display");
                    const welcomeText = el("welcome-text");

                    if (!authSection || !userDisplay || !welcomeText) {
                        console.error("Missing required DOM elements.");
                        return;
                    }

                    if (user) {
                        currentUser = user;
                        authSection.classList.add("hidden");
                        userDisplay.classList.remove("hidden");
                        welcomeText.innerText = `Hi, ${user.displayName || user.email || "User"}`;
                        syncData();
                    } else {
                        currentUser = null;
                        detachWorkoutListener();
                        clearUiForSignedOutUser();

                        authSection.classList.remove("hidden");
                        userDisplay.classList.add("hidden");

                        renderAll();
                    }
                });
            } catch (err) {
                console.error("Firebase init error:", err);
                alert("Firebase initialization failed: " + err.message);
            }
        }

        window.addEventListener("load", initializeApp);

        function login() {
            if (!auth) {
                alert("Firebase Auth is not initialized yet.");
                return;
            }

            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => {
                console.error("Login error:", err);
                alert(err.message);
            });
        }

        function logout() {
            detachWorkoutListener();
            clearUiForSignedOutUser();
            renderAll();

            if (!auth) return;

            auth.signOut().catch(err => {
                console.error("Logout error:", err);
                alert(err.message);
            });
        }

        function detachWorkoutListener() {
            if (workoutsRef) {
                workoutsRef.off();
                workoutsRef = null;
            }
        }

        function clearUiForSignedOutUser() {
            workoutData = {};
            selectedDateKey = "";

            const logPanel = el("log-panel");
            if (logPanel) {
                logPanel.style.display = "none";
            }
        }

        function syncData() {
            if (!db) return;

            detachWorkoutListener();
            workoutsRef = db.ref("workouts");

            workoutsRef.on(
                "value",
                snapshot => {
                    workoutData = snapshot.val() || {};
                    renderAll();
                },
                err => {
                    console.error("Realtime DB read error:", err);
                }
            );
        }

        function getAllTrackedUsers() {
            const users = new Set();

            Object.values(workoutData).forEach(day => {
                if (!day || typeof day !== "object") return;

                Object.values(day).forEach(entry => {
                    if (entry && entry.user) {
                        users.add(entry.user);
                    }
                });
            });

            return Array.from(users).sort((a, b) => a.localeCompare(b));
        }

        function renderAll() {
            renderUserFilter();
            renderEntryUserOptions();
            renderCalendar();
            renderStats();

            if (selectedDateKey) {
                renderLogOnly(selectedDateKey);
            }
        }

        function renderUserFilter() {
            const filter = el("userFilter");
            if (!filter) return;

            const previousValue = filter.value || "all";
            const users = getAllTrackedUsers();

            filter.innerHTML = '<option value="all">Everyone</option>';

            users.forEach(user => {
                const option = document.createElement("option");
                option.value = user;
                option.textContent = user;
                filter.appendChild(option);
            });

            const availableValues = ["all", ...users];
            filter.value = availableValues.includes(previousValue) ? previousValue : "all";
        }

        function renderEntryUserOptions() {
            const select = el("entryUserSelect");
            const customInput = el("entryUserCustom");
            if (!select || !customInput) return;

            const previousValue = select.value || "me";
            const users = getAllTrackedUsers();
            const currentDisplayName = currentUser ? (currentUser.displayName || currentUser.email || "User") : "Me";

            select.innerHTML = "";

            const meOption = document.createElement("option");
            meOption.value = "me";
            meOption.textContent = `Me (${currentDisplayName})`;
            select.appendChild(meOption);

            users.forEach(user => {
                if (user === currentDisplayName) return;
                const option = document.createElement("option");
                option.value = `user:${user}`;
                option.textContent = user;
                select.appendChild(option);
            });

            const customOption = document.createElement("option");
            customOption.value = "custom";
            customOption.textContent = "Custom name...";
            select.appendChild(customOption);

            const validValues = ["me", "custom", ...users.map(user => `user:${user}`).filter(v => v !== `user:${currentDisplayName}`)];
            select.value = validValues.includes(previousValue) ? previousValue : "me";

            handleEntryUserChange();
        }

        function handleEntryUserChange() {
            const select = el("entryUserSelect");
            const customInput = el("entryUserCustom");
            if (!select || !customInput) return;

            if (select.value === "custom") {
                customInput.classList.remove("hidden");
            } else {
                customInput.classList.add("hidden");
                customInput.value = "";
            }
        }

        function getSelectedEntryUserName() {
            const select = el("entryUserSelect");
            const customInput = el("entryUserCustom");

            if (!select) return "";

            if (select.value === "me") {
                return currentUser ? (currentUser.displayName || currentUser.email || "User") : "";
            }

            if (select.value === "custom") {
                return customInput ? customInput.value.trim() : "";
            }

            if (select.value.startsWith("user:")) {
                return select.value.slice(5);
            }

            return "";
        }

        function renderCalendar() {
            const grid = el("calendarGrid");
            const monthDisplay = el("monthDisplay");
            const filterEl = el("userFilter");

            if (!grid || !monthDisplay || !filterEl) return;

            const filter = filterEl.value;
            grid.innerHTML = "";

            const y = currentDate.getFullYear();
            const m = currentDate.getMonth();

            monthDisplay.innerText = currentDate.toLocaleDateString("en-US", {
                month: "long",
                year: "numeric"
            });

            const firstDay = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            const today = new Date();

            for (let i = 0; i < firstDay; i++) {
                const spacer = document.createElement("div");
                grid.appendChild(spacer);
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = formatDateKey(y, m, d);
                const dayEntries = workoutData[dateKey] ? Object.values(workoutData[dateKey]) : [];
                const hasData = dayEntries.some(w => filter === "all" || w.user === filter);
                const isToday = today.toDateString() === new Date(y, m, d).toDateString();
                const isSelected = selectedDateKey === dateKey;

                const dayDiv = document.createElement("div");
                dayDiv.classList.add("day");
                if (hasData) dayDiv.classList.add("has-workout");
                if (isToday) dayDiv.classList.add("today");
                if (isSelected) dayDiv.classList.add("selected");

                dayDiv.textContent = d;
                dayDiv.dataset.dateKey = dateKey;
                dayDiv.addEventListener("click", () => openLog(dateKey));

                grid.appendChild(dayDiv);
            }
        }

        function setSelectedDayInDom(dateKey) {
            document.querySelectorAll("#calendarGrid .day.selected").forEach(node => {
                node.classList.remove("selected");
            });

            const selectedNode = document.querySelector(`#calendarGrid .day[data-date-key="${escapeCss(dateKey)}"]`);
            if (selectedNode) {
                selectedNode.classList.add("selected");
            }
        }

        function openLog(dateKey) {
            selectedDateKey = dateKey;
            setSelectedDayInDom(dateKey);
            renderLogOnly(dateKey);
        }

        function renderLogOnly(dateKey) {
            const logPanel = el("log-panel");
            const selectedDateText = el("selectedDateText");
            const existingEntries = el("existingEntries");
            const filterEl = el("userFilter");

            if (!logPanel || !selectedDateText || !existingEntries || !filterEl) return;

            logPanel.style.display = "block";
            selectedDateText.innerText = dateKey;

            const filter = filterEl.value;
            const entries = workoutData[dateKey] ? Object.entries(workoutData[dateKey]) : [];
            const filteredEntries = entries.filter(([, item]) => filter === "all" || item.user === filter);

            if (!filteredEntries.length) {
                existingEntries.innerHTML = '<div class="muted" style="margin-top:10px;">No entries for this date.</div>';
                return;
            }

            existingEntries.innerHTML = "";

            filteredEntries.forEach(([id, item]) => {
                const wrap = document.createElement("div");
                wrap.className = "entry-item";

                const userEl = document.createElement("small");
                userEl.style.color = "var(--accent)";
                userEl.textContent = item.user || "Unknown";

                const noteEl = document.createElement("div");
                noteEl.className = "entry-note";
                noteEl.textContent = `${item.note || ""} (${Number(item.mins || 0)}m)`;

                wrap.appendChild(userEl);
                wrap.appendChild(noteEl);

                if (item.createdBy && item.createdBy !== item.user) {
                    const metaEl = document.createElement("div");
                    metaEl.className = "entry-meta";
                    metaEl.textContent = `Logged by ${item.createdBy}`;
                    wrap.appendChild(metaEl);
                }

                const canDelete = currentUser && item.uid === currentUser.uid;
                if (canDelete) {
                    const del = document.createElement("span");
                    del.className = "btn-del";
                    del.innerHTML = "&times;";
                    del.onclick = () => deleteEntry(dateKey, id);
                    wrap.appendChild(del);
                }

                existingEntries.appendChild(wrap);
            });
        }

        function saveWorkout() {
            if (!currentUser) {
                alert("Log in to save data.");
                return;
            }

            if (!selectedDateKey) {
                alert("Select a date first.");
                return;
            }

            const workoutInput = el("workoutInput");
            const durationInput = el("durationInput");

            if (!workoutInput || !durationInput) return;

            const note = workoutInput.value.trim();
            const mins = parseInt(durationInput.value, 10);
            const targetUser = getSelectedEntryUserName();
            const currentDisplayName = currentUser.displayName || currentUser.email || "User";

            if (!targetUser) {
                alert("Choose a user or enter a custom name.");
                return;
            }

            if (!note) {
                alert("Enter workout details.");
                return;
            }

            if (!Number.isFinite(mins) || mins <= 0) {
                alert("Enter a valid number of minutes.");
                return;
            }

            db.ref(`workouts/${selectedDateKey}`).push({
                user: targetUser,
                uid: currentUser.uid,
                createdBy: currentDisplayName,
                createdByUid: currentUser.uid,
                note: note,
                mins: mins,
                timestamp: Date.now()
            }).then(() => {
                workoutInput.value = "";
                durationInput.value = "";

                const entryUserSelect = el("entryUserSelect");
                const entryUserCustom = el("entryUserCustom");
                if (entryUserSelect) entryUserSelect.value = "me";
                if (entryUserCustom) entryUserCustom.value = "";
                handleEntryUserChange();
            }).catch(err => {
                console.error("Save error:", err);
                alert(err.message);
            });
        }

        function deleteEntry(dateKey, entryId) {
            const entry = workoutData?.[dateKey]?.[entryId];

            if (!entry) {
                alert("Entry not found.");
                return;
            }

            if (!currentUser || entry.uid !== currentUser.uid) {
                alert("You can only delete your own entries.");
                return;
            }

            if (confirm("Delete this entry?")) {
                db.ref(`workouts/${dateKey}/${entryId}`).remove().catch(err => {
                    console.error("Delete error:", err);
                    alert(err.message);
                });
            }
        }

        function renderStats() {
            const filterEl = el("userFilter");
            const timeframeEl = el("timeframe");
            const statDisplay = el("statDisplay");
            const recentList = el("recentList");

            if (!filterEl || !timeframeEl || !statDisplay || !recentList) return;

            const filter = filterEl.value;
            const timeframe = timeframeEl.value;
            let all = [];

            Object.keys(workoutData).forEach(dateKey => {
                const dayEntries = workoutData[dateKey];
                if (!dayEntries || typeof dayEntries !== "object") return;

                Object.values(dayEntries).forEach(entry => {
                    if (filter === "all" || entry.user === filter) {
                        all.push({
                            ...entry,
                            date: dateKey
                        });
                    }
                });
            });

            const now = new Date();
            let start = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            if (timeframe === "week") {
                start.setDate(now.getDate() - now.getDay());
            } else if (timeframe === "month") {
                start = new Date(now.getFullYear(), now.getMonth(), 1);
            } else if (timeframe === "year") {
                start = new Date(now.getFullYear(), 0, 1);
            }

            const totalMins = all
                .filter(w => parseDateKey(w.date) >= start)
                .reduce((sum, w) => sum + Number(w.mins || 0), 0);

            statDisplay.innerText = (totalMins / 60).toFixed(1) + "h";

            all.sort((a, b) => Number(b.timestamp || 0) - Number(a.timestamp || 0));

            if (!all.length) {
                recentList.innerHTML = '<div class="muted">No workout history yet.</div>';
                return;
            }

            recentList.innerHTML = all.slice(0, 5).map(w => `
                <div class="history-item">
                    <b>${w.user || "Unknown"}</b>: ${w.note || ""} (${Number(w.mins || 0)}m)
                </div>
            `).join("");
        }

        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);

            const y = currentDate.getFullYear();
            const m = currentDate.getMonth();

            if (selectedDateKey) {
                const selected = parseDateKey(selectedDateKey);
                if (selected.getFullYear() !== y || selected.getMonth() !== m) {
                    selectedDateKey = "";
                    const logPanel = el("log-panel");
                    if (logPanel) {
                        logPanel.style.display = "none";
                    }
                }
            }

            renderCalendar();
        }
    </script>
</body>
